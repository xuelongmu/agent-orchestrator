components:
  schemas:
    APIError:
      properties:
        code:
          type: string
        details:
          additionalProperties: {}
          type: object
        error:
          type: string
        message:
          type: string
        requestId:
          type: string
      required:
      - error
      - code
      - message
      type: object
    AddProjectInput:
      properties:
        asWorkspace:
          type: boolean
        config:
          $ref: '#/components/schemas/ProjectConfig'
        name:
          type:
          - "null"
          - string
        path:
          type: string
        projectId:
          type:
          - "null"
          - string
      required:
      - path
      type: object
    AgentConfig:
      properties:
        model:
          type: string
        permissions:
          type: string
      type: object
    AgentInfo:
      properties:
        authStatus:
          description: Advisory local auth probe result. authorized means a recent
            local probe passed; spawn remains the authoritative validation point.
          enum:
          - authorized
          - unauthorized
          - unknown
          type: string
        id:
          type: string
        label:
          type: string
      required:
      - id
      - label
      type: object
    CancelReviewResponse:
      properties:
        reviewerHandleId:
          type: string
        reviews:
          items:
            $ref: '#/components/schemas/PRReviewState'
          type: array
      required:
      - reviewerHandleId
      - reviews
      type: object
    ClaimPRRequest:
      properties:
        allowTakeover:
          type:
          - "null"
          - boolean
        pr:
          minLength: 1
          type: string
      required:
      - pr
      type: object
    ClaimPRResponse:
      properties:
        branchChanged:
          type: boolean
        ok:
          type: boolean
        prs:
          items:
            $ref: '#/components/schemas/SessionPRFacts'
          type: array
        sessionId:
          type: string
        takenOverFrom:
          items:
            type: string
          type: array
      required:
      - ok
      - sessionId
      - prs
      - branchChanged
      - takenOverFrom
      type: object
    CleanupSessionsResponse:
      properties:
        cleaned:
          items:
            type: string
          type: array
        ok:
          type: boolean
        skipped:
          items:
            $ref: '#/components/schemas/CleanupSkippedSession'
          type: array
      required:
      - ok
      - cleaned
      - skipped
      type: object
    CleanupSkippedSession:
      properties:
        reason:
          type: string
        sessionId:
          type: string
      required:
      - sessionId
      - reason
      type: object
    ControllersSessionView:
      properties:
        activity:
          $ref: '#/components/schemas/DomainActivity'
        branch:
          type: string
        createdAt:
          format: date-time
          type: string
        displayName:
          type: string
        harness:
          type: string
        id:
          type: string
        isTerminated:
          type: boolean
        issueId:
          type: string
        kind:
          type: string
        previewRevision:
          format: int64
          type: integer
        previewUrl:
          type: string
        projectId:
          type: string
        prs:
          items:
            $ref: '#/components/schemas/SessionPRFacts'
          type: array
        status:
          enum:
          - working
          - pr_open
          - draft
          - ci_failed
          - review_pending
          - changes_requested
          - approved
          - mergeable
          - merged
          - needs_input
          - idle
          - terminated
          - no_signal
          type: string
        terminalHandleId:
          type: string
        updatedAt:
          format: date-time
          type: string
      required:
      - id
      - projectId
      - kind
      - activity
      - isTerminated
      - createdAt
      - updatedAt
      - status
      - prs
      type: object
    DegradedProject:
      properties:
        id:
          type: string
        kind:
          type: string
        name:
          type: string
        path:
          type: string
        resolveError:
          type: string
      required:
      - id
      - name
      - kind
      - path
      - resolveError
      type: object
    DomainActivity:
      properties:
        lastActivityAt:
          format: date-time
          type: string
        state:
          type: string
      required:
      - state
      - lastActivityAt
      type: object
    DomainReviewerConfig:
      properties:
        harness:
          type: string
      required:
      - harness
      type: object
    ImportReport:
      properties:
        dryRun:
          type: boolean
        notes:
          items:
            type: string
          type: array
        projectsImported:
          type: integer
        projectsSkipped:
          type: integer
      required:
      - dryRun
      - projectsImported
      - projectsSkipped
      type: object
    ImportRunResponse:
      properties:
        report:
          $ref: '#/components/schemas/ImportReport'
      required:
      - report
      type: object
    ImportStatusResponse:
      properties:
        available:
          type: boolean
        legacyRoot:
          type: string
      required:
      - available
      - legacyRoot
      type: object
    InitializeRepositoryInput:
      properties:
        path:
          type: string
      required:
      - path
      type: object
    InitializeRepositoryResult:
      properties:
        path:
          type: string
      required:
      - path
      type: object
    KillSessionResponse:
      properties:
        freed:
          type: boolean
        ok:
          type: boolean
        sessionId:
          type: string
      required:
      - ok
      - sessionId
      type: object
    ListAgentsResponse:
      properties:
        authorized:
          description: Compatibility list of installed agents whose local auth probe
            recently returned authorized. Advisory and stale-prone; spawn may still
            fail.
          items:
            $ref: '#/components/schemas/AgentInfo'
          type: array
        installed:
          description: Agents whose binary resolved during the latest best-effort
            local catalog probe.
          items:
            $ref: '#/components/schemas/AgentInfo'
          type: array
        supported:
          description: Agents supported by this daemon build.
          items:
            $ref: '#/components/schemas/AgentInfo'
          type: array
      required:
      - supported
      - installed
      - authorized
      type: object
    ListNotificationsResponse:
      properties:
        notifications:
          items:
            $ref: '#/components/schemas/NotificationResponse'
          type: array
      required:
      - notifications
      type: object
    ListProjectsResponse:
      properties:
        projects:
          items:
            $ref: '#/components/schemas/ProjectSummary'
          type: array
      required:
      - projects
      type: object
    ListReviewsResponse:
      properties:
        reviewerHandleId:
          type: string
        reviews:
          items:
            $ref: '#/components/schemas/PRReviewState'
          type: array
      required:
      - reviewerHandleId
      - reviews
      type: object
    ListSessionPRsResponse:
      properties:
        prs:
          items:
            $ref: '#/components/schemas/SessionPRSummary'
          type: array
        sessionId:
          type: string
      required:
      - sessionId
