name: Go

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "backend/**"
      - "frontend/src/api/schema.ts"
      - "package.json"
      - ".github/workflows/go.yml"

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # Read the version from go.mod so CI can't drift from the module
          # (it previously pinned 1.22 while go.mod declared 1.25).
          go-version-file: backend/go.mod
          cache: false

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      # The current Go integration tests need only host-provided git and tmux,
      # so every hosted Ubuntu run is a trusted context. Do not let a missing
      # runner prerequisite turn this blocking check into a false-green skip.
      - name: Test with trusted integrations and coverage
        env:
          AO_REQUIRE_INTEGRATION: "1"
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...

      - name: Enforce coverage ratchet
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t floors < <(sed -E 's/#.*$//; s/^[[:space:]]+//; s/[[:space:]]+$//' coverage-baseline.txt | grep -v '^$')
          if (( ${#floors[@]} != 1 )) || [[ ! ${floors[0]} =~ ^(100(\.0{1,2})?|[0-9]{1,2}(\.[0-9]{1,2})?)$ ]]; then
            echo "::error::coverage-baseline.txt must contain exactly one percentage from 0 through 100"
            exit 1
          fi

          floor=${floors[0]}
          actual=$(go tool cover -func=coverage.out | awk '$1 == "total:" { gsub("%", "", $3); print $3 }')
          if [[ -z $actual ]]; then
            echo "::error::coverage.out did not contain a total statement percentage"
            exit 1
          fi
          echo "Go statement coverage: ${actual}% (ratchet floor: ${floor}%)"
          if ! awk -v actual="$actual" -v floor="$floor" 'BEGIN { exit !(actual + 0 >= floor + 0) }'; then
            echo "::error::Go statement coverage fell below the ratchet floor"
            exit 1
          fi

  verification-runner:
    name: Verification runner (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: false

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Test out-of-band verification lifecycle
        run: go test -count=1 ./internal/service/verification

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: false

      - name: golangci-lint
        # v8 of the action drives golangci-lint v2 (the schema this config uses);
        # the v6 action speaks v1 CLI flags and errors against a v2 binary.
        uses: golangci/golangci-lint-action@v8
        with:
          # Pinned for reproducibility: bump intentionally rather than letting an
          # upstream release change CI. Must be built with Go >= the module's
          # (go.mod is 1.25); v2.12.2 is built with go1.25 — older v2 tags
          # (e.g. v2.1.x) are built with go1.24 and refuse to analyze 1.25 code.
          version: v2.12.2
          working-directory: backend
          # Blocking on the full ruleset: the tree is clean at zero findings, so
          # any new issue fails CI rather than being grandfathered.

  api-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: false

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Regenerate API spec and TS types
        run: npm run api

      # openapi.yaml drift is already caught by TestBuild_MatchesEmbedded in
      # the build-test job (go test -race ./...). Only schema.ts needs checking here.
      - name: Check for schema.ts drift
        run: git diff --exit-code -- frontend/src/api/schema.ts
