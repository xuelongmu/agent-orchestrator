name: Deploy landing to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "frontend/src/landing/**"
      - ".github/workflows/deploy-landing.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/src/landing/package-lock.json
      - name: Install
        working-directory: frontend/src/landing
        run: npm ci
      - name: Build static export
        working-directory: frontend/src/landing
        run: npm run build
      - uses: actions/configure-pages@v5
        with:
          # Creates the Pages site (source: GitHub Actions) on first run, so no
          # repo-admin visit to Settings > Pages is needed.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/src/landing/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
